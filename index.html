<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Emotion Analyzer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Plus Jakarta Sans', 'sans-serif'],
            },
            colors: {
              emotion: {
                joy: '#4CAF50',
                sadness: '#2196F3',
                anger: '#F44336',
                fear: '#FF9800',
                surprise: '#9C27B0',
                disgust: '#795548',
              }
            },
            animation: {
              'fade-in': 'fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1)',
              'slide-up': 'slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1)',
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'float': 'float 6s ease-in-out infinite',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              slideUp: {
                '0%': { transform: 'translateY(20px)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' },
              },
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' },
              }
            },
            boxShadow: {
              'glass': '0 8px 32px 0 rgba(31, 38, 135, 0.07)',
              'glow': '0 0 20px rgba(99, 102, 241, 0.5)',
            }
          },
        },
      }
    </script>
    <style>
      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background-attachment: fixed;
        -webkit-font-smoothing: antialiased;
      }
      * {
        --tw-shadow: 0 0 #0000 !important;
        backdrop-filter: none !important;
      }
      .rounded-xl, .rounded-2xl, .rounded-3xl { border-radius: 0.75rem !important; }
      .bg-mesh { background-color: #f8fafc; }
      .dark .bg-mesh { background-color: #0f172a; }
    </style>
</head>
  <body class="bg-mesh text-slate-800 dark:bg-slate-950 dark:text-slate-200 transition-colors duration-500 min-h-screen">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
</body>
</html>
